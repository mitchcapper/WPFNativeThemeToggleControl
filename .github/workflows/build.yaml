name: Build and Pack NuGet

on:
  push:
    branches-ignore:
      - trash
      
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Matches the net10.0-windows target

    - name: Restore dependencies
      run: dotnet restore WPFNativeThemeToggleControl/WPFNativeThemeToggleControl.csproj

    - name: Build
      run: dotnet build WPFNativeThemeToggleControl/WPFNativeThemeToggleControl.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack WPFNativeThemeToggleControl/WPFNativeThemeToggleControl.csproj --configuration Release --no-build --output ${{ github.workspace }}/nupkg

    - name: Upload NuGet Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPFNativeThemeToggleControl-NuGet
        path: ${{ github.workspace }}/nupkg/*.nupkg
        if-no-files-found: error
